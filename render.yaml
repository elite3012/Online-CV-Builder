services:
  - type: web
    name: cv-builder-frontend
    runtime: static
    buildCommand: cd frontend && npm install && VITE_API_URL="${BACKEND_PUBLIC_URL}/api" npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: BACKEND_PUBLIC_URL
        fromService:
          name: cv-builder-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: cv-builder-backend
    runtime: docker
    plan: free
    region: singapore
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: APP_LOG_LEVEL
        value: INFO
      - key: AI_SERVICE_ENABLED
        value: "true"
      - key: AI_SERVICE_TIMEOUT_MS
        value: "7000"
      - key: AI_SERVICE_URL
        fromService:
          name: cv-builder-ai-service
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: cv-builder-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: cv-builder-ai-service
    runtime: docker
    plan: free
    region: singapore
    dockerContext: ./python-ai-service
    dockerfilePath: ./python-ai-service/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: EMBEDDING_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: HF_HOME
        value: /app/.hf-cache
      - key: TRACE_DIR
        value: /app/traces

databases:
  - name: cv-builder-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    databaseName: cvbuilder
    user: cvbuilder
