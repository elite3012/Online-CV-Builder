# Server Configuration
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/CVBuilder
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=minhmatmong
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# to avoid postgres default user table
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production
jwt.expirationMs=3636000

# Rate Limiter Configuration
auth.login.maxAttempts=5
auth.login.windowMs=60000
auth.login.blockMs=120000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.cvbuilder=DEBUG
