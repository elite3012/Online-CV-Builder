# Server Configuration
server.port=${SERVER_PORT:8081}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/CVBuilder}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# to avoid postgres default user table
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production}
jwt.expirationMs=${JWT_EXPIRATION_MS:3636000}

# Rate Limiter Configuration
auth.login.maxAttempts=5
auth.login.windowMs=60000
auth.login.blockMs=120000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.cvbuilder=${APP_LOG_LEVEL:DEBUG}

# AI Service
ai.service.enabled=${AI_SERVICE_ENABLED:true}
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
ai.service.timeoutMs=${AI_SERVICE_TIMEOUT_MS:2500}
